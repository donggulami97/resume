<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>来了解我吧</title>
    <style>
        :root { --nav-bg: #1a2a3a; --sidebar-width: 240px; --accent-blue: #3498db; --text-main: #2c3e50; --bg-light: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg-light); display: flex; min-height: 100vh; color: var(--text-main); }
        .sidebar { width: var(--sidebar-width); background: var(--nav-bg); color: white; position: fixed; height: 100%; padding: 30px 0; display: flex; flex-direction: column; }
        .profile-zone { padding: 0 20px 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .profile-zone h1 { font-size: 24px; margin-bottom: 5px; }
        .profile-zone p { font-size: 13px; color: #94a3b8; }
        .nav-menu { margin-top: 20px; list-style: none; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: all 0.3s; border-left: 4px solid transparent; font-size: 15px; color: #cbd5e1; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(52, 152, 219, 0.1); color: var(--accent-blue); border-left-color: var(--accent-blue); font-weight: 600; }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 50px 80px; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2.section-header { font-size: 28px; margin-bottom: 30px; color: var(--nav-bg); display: flex; align-items: center; }
        h2.section-header::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin-left: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .item-title { font-size: 18px; font-weight: 700; color: #1e293b; }
        .item-tag { font-size: 14px; color: var(--accent-blue); font-weight: 500; }
        .item-date { font-size: 13px; color: #94a3b8; }
        .detail-list { list-style: none; }
        .detail-list li { margin-bottom: 12px; padding-left: 20px; position: relative; font-size: 15px; line-height: 1.7; color: #475569; }
        .detail-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent-blue); }
        .contact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; padding: 20px 0; } .main-content { margin-left: 0; padding: 30px 20px; } .nav-menu { display: flex; overflow-x: auto; white-space: nowrap; } .nav-item { padding: 10px 20px; border-left: none; border-bottom: 2px solid transparent; } .nav-item.active { border-bottom-color: var(--accent-blue); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="profile-zone">
            <img src="https://files.mdnice.com/user/62362/779b5c32-e092-491c-8e0b-22d7159c3a07.png" class="avatar" alt="头像">
            <h1>杨聪灵</h1>
            <p>薪酬绩效专家 / ISTJ</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="openTab(event, 'basic')">基本信息</li>
            <li class="nav-item" onclick="openTab(event, 'work')">工作经历</li>
            <li class="nav-item" onclick="openTab(event, 'project')">重点项目</li>
            <li class="nav-item" onclick="openTab(event, 'skills')">专业优势</li>
        </ul>
    </nav>
    <main class="main-content">
        <div id="basic" class="tab-content active">
            <h2 class="section-header">基本信息</h2>
            <div class="card">
                <div class="contact-grid">
                    <div><strong>联系电话：</strong>15027832571</div>
                    <div><strong>电子邮箱：</strong>2396908417@qq.com</div>
                    <div><strong>出生年月：</strong>2000.10.30</div>
                    <div><strong>最高学历：</strong>中国传媒大学</div>
                </div>
            </div>
        </div>
        <div id="work" class="tab-content">
            <h2 class="section-header">职业生涯</h2>
            <div class="card">
                <div class="item-header">
                    <div><span class="item-title">毕马威 (KPMG)</span><br><span class="item-tag">Performance and Development</span></div>
                    <span class="item-date">2024.11 - 至今</span>
                </div>
                <ul class="detail-list"><li>主要负责绩效数据分析以及绩效目标管理等环节的运营。</li></ul>
            </div>
        </div>
        <div id="project" class="tab-content"><h2 class="section-header">重点项目</h2><div class="card"><p>项目内容加载中...</p></div></div>
        <div id="skills" class="tab-content"><h2 class="section-header">专业优势</h2><div class="card"><p>技能模块加载中...</p></div></div>
    </main>
    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, navitems;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
            navitems = document.getElementsByClassName("nav-item");
            for (i = 0; i < navitems.length; i++) { navitems[i].classList.remove("active"); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
